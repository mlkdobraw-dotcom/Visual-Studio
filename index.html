        <meta name="viewport" content="width=device-width, inicial-scale=1.0">
    </head>
    <body>
        
        <header>
            <div class="logo">
                <img src="images/download__4_-removebg-preview.png" alt="logo Visual Studio">

            <nav id="nav">
                <a href="">Inicio</a>
                <a href="">Recursos</a>
                <a href="">Contato</a>
            </nav>
        </header>
        <section class="Inicio">
            <div class="texto">
                <h2>Desenvolva com Visual Studio</h2>
                <p>
                    Crie Sites, aplicativos, jogos e muito mais
                    usando uma das IDEs mais famosas do mundo.    
                </p>
                <button id="botao">Baixar Agora</button>

        <section class="explicacao">
        
            <div class="card active " id="card">
            
                <h2 id="html">HTML</h2>
            <p>Escreve a estrutura do seu site.</p>
        
        </div>
        
        <div class="card " id="card">
        
            <h2 id="css">CSS</h2>
            <p>Decora o seu site</p>
        
        </div>
        <div class="card" id="card">
            <h2 id="JS">JavaScript</h2>
            <p>Da vida ao seu site</p>
        </div>
        
        <div class="arrow">
            <button id="prev"> < </button>
            <button id="next"> > </button>
        </div>
        
        </section>

    <script src="script.js"></script>
